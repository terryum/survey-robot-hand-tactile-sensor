name: Translation Improvement
description: Suggest a better Korean or English translation
title: "[Translation] "
labels: ["translation"]
assignees: ["terryum"]
body:
  - type: dropdown
    id: direction
    attributes:
      label: Which version to improve?
      options:
        - "Korean version (book/ko/)"
        - "English version (book/en/)"
    validations:
      required: true
  - type: dropdown
    id: chapter
    attributes:
      label: Chapter
      options:
        - "Ch01: Why Tactile Sensing"
        - "Ch02: Tactile Sensor Technology"
        - "Ch03: Tactile Data"
        - "Ch04: Robot Hand Design"
        - "Ch05: Intelligent Mechanisms"
        - "Ch06: Human Hand Data Collection"
        - "Ch07: Learning to Manipulate"
        - "Ch08: VLA Models"
        - "Ch09: Sim-to-Real Transfer"
        - "Ch10: Embodiment Retargeting"
        - "Ch11: Research Integration"
        - "Ch12: Physical AI & Industry"
        - "Ch13: Limitations & Future"
        - "Glossary"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current text
      description: Copy the current text that needs improvement.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested translation
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this better?
      description: Explain why the suggested translation is more accurate or natural.
    validations:
      required: true
